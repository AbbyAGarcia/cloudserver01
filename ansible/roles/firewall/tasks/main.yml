

---
- name: Deny all incoming by default
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow outgoing by default
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
